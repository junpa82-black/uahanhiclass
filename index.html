<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1020" />
    <title>Hi강리가족</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f6fb;
        --bg-elevated: #ffffff;
        --mesh-1: rgba(8, 145, 178, 0.1);
        --mesh-2: rgba(249, 115, 22, 0.09);
        --mesh-3: rgba(124, 58, 237, 0.07);
        --stroke: rgba(28, 25, 23, 0.09);
        --text: #0f172a;
        --text-soft: #475569;
        --accent: #7c3aed;
        --accent-dim: #6d28d9;
        --accent-glow: rgba(124, 58, 237, 0.35);
        --liu: #0891b2;
        --liu-soft: color-mix(in srgb, var(--liu) 14%, var(--bg-elevated));
        --liu-glow: rgba(8, 145, 178, 0.28);
        --lia: #ea580c;
        --lia-soft: color-mix(in srgb, var(--lia) 14%, var(--bg-elevated));
        --lia-glow: rgba(234, 88, 12, 0.28);
        --meal: #d97706;
        --meal-glow: rgba(217, 119, 6, 0.22);
        --hitalk: #a855f7;
        --hitalk-glow: rgba(168, 85, 247, 0.25);
        --radius-xl: clamp(1.35rem, 3vw, 1.85rem);
        --radius-lg: 1.15rem;
        --font-display: "Outfit", system-ui, sans-serif;
        --font-body: "IBM Plex Sans KR", system-ui, sans-serif;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1020;
          --bg-elevated: #12182a;
          --mesh-1: rgba(34, 211, 238, 0.1);
          --mesh-2: rgba(251, 146, 60, 0.08);
          --mesh-3: rgba(167, 139, 250, 0.09);
          --stroke: rgba(255, 255, 255, 0.09);
          --text: #f1f5f9;
          --text-soft: #94a3b8;
          --accent: #a78bfa;
          --accent-dim: #c4b5fd;
          --accent-glow: rgba(167, 139, 250, 0.28);
          --liu: #22d3ee;
          --liu-soft: color-mix(in srgb, var(--liu) 12%, var(--bg-elevated));
          --liu-glow: rgba(34, 211, 238, 0.22);
          --lia: #fb923c;
          --lia-soft: color-mix(in srgb, var(--lia) 12%, var(--bg-elevated));
          --lia-glow: rgba(251, 146, 60, 0.22);
          --meal: #fbbf24;
          --meal-glow: rgba(251, 191, 36, 0.2);
          --hitalk: #c084fc;
          --hitalk-glow: rgba(192, 132, 252, 0.22);
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font-body);
        color: var(--text);
        background-color: var(--bg);
        overflow-x: hidden;
        line-height: 1.55;
      }

      /* 앰비언트 메시 & 노이즈 오버레이 */
      .ambient {
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(80% 55% at 12% 18%, var(--mesh-1), transparent 55%),
          radial-gradient(70% 45% at 88% 12%, var(--mesh-2), transparent 50%),
          radial-gradient(65% 50% at 50% 92%, var(--mesh-3), transparent 55%);
      }
      .ambient::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.045;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }
      @media (prefers-color-scheme: dark) {
        .ambient::after {
          opacity: 0.06;
        }
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .shell {
        position: relative;
        z-index: 1;
        max-width: 68rem;
        margin: 0 auto;
        padding: clamp(1rem, 3.5vw, 2rem) clamp(1rem, 4vw, 2.25rem) 2.5rem;
      }

      /* 상단 바 */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: clamp(1.25rem, 4vw, 2rem);
        padding: 0.6rem 1rem 0.6rem 0.85rem;
        border-radius: 100px;
        border: 1px solid color-mix(in srgb, var(--stroke) 85%, var(--accent));
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--bg-elevated) 92%, var(--liu-soft)) 0%, var(--bg-elevated) 50%, color-mix(in srgb, var(--bg-elevated) 90%, var(--lia-soft)) 100%);
        backdrop-filter: blur(20px) saturate(1.2);
        -webkit-backdrop-filter: blur(20px) saturate(1.2);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.45) inset,
          0 12px 40px -28px color-mix(in srgb, var(--accent-glow), transparent 40%);
      }
      @media (prefers-color-scheme: dark) {
        .topbar {
          background:
            linear-gradient(135deg, color-mix(in srgb, var(--bg-elevated) 88%, transparent) 0%, var(--bg-elevated) 45%, color-mix(in srgb, var(--bg-elevated) 85%, #1e293b) 100%);
          box-shadow:
            0 1px 0 rgba(255, 255, 255, 0.06) inset,
            0 14px 48px -26px rgba(0, 0, 0, 0.45);
        }
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        min-width: 0;
      }
      .brand-mark {
        width: 2.2rem;
        height: 2.2rem;
        border-radius: 0.7rem;
        background: linear-gradient(145deg, var(--liu) 0%, var(--accent) 48%, #ec4899 100%);
        box-shadow:
          0 0 0 2px color-mix(in srgb, var(--bg-elevated) 80%, transparent),
          0 10px 28px color-mix(in srgb, var(--accent-glow), var(--liu-glow) 50%);
        flex-shrink: 0;
      }
      .brand-text {
        display: flex;
        flex-direction: column;
        gap: 0.05rem;
        min-width: 0;
      }
      .brand-kicker {
        font-family: var(--font-display);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-soft);
      }
      .brand-name {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 0.95rem;
        letter-spacing: -0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tag-live {
        font-family: var(--font-display);
        font-variant-numeric: tabular-nums;
        font-size: 0.78rem;
        font-weight: 700;
        padding: 0.4rem 0.95rem;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--stroke) 70%, var(--accent));
        background: linear-gradient(180deg, color-mix(in srgb, var(--bg-elevated) 70%, transparent), var(--bg-elevated));
        color: var(--text);
        letter-spacing: 0.06em;
        flex-shrink: 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        .tag-live {
          box-shadow: 0 2px 16px rgba(0, 0, 0, 0.25);
        }
      }

      /* 벤토 */
      .bento {
        display: grid;
        gap: clamp(1rem, 2.6vw, 1.35rem);
        grid-template-columns: 1fr;
      }
      @media (min-width: 860px) {
        .bento {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto auto;
        }
        .tile--a {
          grid-column: 1;
          grid-row: 1;
        }
        .tile--b {
          grid-column: 2;
          grid-row: 1;
        }
        .tile--wide {
          grid-column: 1 / -1;
          grid-row: 2;
        }
      }

      .tile {
        position: relative;
        isolation: isolate;
        border-radius: var(--radius-xl);
        border: 1px solid var(--stroke);
        background: linear-gradient(
          155deg,
          color-mix(in srgb, var(--bg-elevated) 92%, transparent) 0%,
          color-mix(in srgb, var(--bg-elevated) 78%, transparent) 100%
        );
        backdrop-filter: blur(20px) saturate(1.08);
        -webkit-backdrop-filter: blur(20px) saturate(1.08);
        overflow: hidden;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.55) inset,
          0 22px 50px -36px rgba(15, 23, 42, 0.12);
        transition:
          transform 0.45s var(--ease-out),
          border-color 0.35s ease,
          box-shadow 0.45s var(--ease-out);
      }
      .tile::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        opacity: 0.4;
        background-image: radial-gradient(circle at 1px 1px, color-mix(in srgb, var(--text) 8%, transparent) 1px, transparent 0);
        background-size: 20px 20px;
        pointer-events: none;
        z-index: 0;
      }
      @media (prefers-color-scheme: dark) {
        .tile {
          box-shadow:
            0 1px 0 rgba(255, 255, 255, 0.05) inset,
            0 24px 56px -32px rgba(0, 0, 0, 0.45);
        }
        .tile::after {
          opacity: 0.25;
          background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.06) 1px, transparent 0);
        }
      }

      /* LIU · LIA — 색 테마 구분 */
      .tile--liu {
        border-color: color-mix(in srgb, var(--liu) 28%, var(--stroke));
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 22px 56px -32px var(--liu-glow),
          -6px 0 0 0 color-mix(in srgb, var(--liu) 88%, transparent) inset;
        background: linear-gradient(
          160deg,
          color-mix(in srgb, var(--bg-elevated) 94%, var(--liu-soft)) 0%,
          color-mix(in srgb, var(--bg-elevated) 72%, transparent) 55%
        );
      }
      .tile--liu::before {
        content: "";
        position: absolute;
        top: -40%;
        right: -25%;
        width: 58%;
        height: 95%;
        background: radial-gradient(ellipse at center, color-mix(in srgb, var(--liu) 18%, transparent), transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .tile--lia {
        border-color: color-mix(in srgb, var(--lia) 28%, var(--stroke));
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 22px 56px -32px var(--lia-glow),
          -6px 0 0 0 color-mix(in srgb, var(--lia) 88%, transparent) inset;
        background: linear-gradient(
          160deg,
          color-mix(in srgb, var(--bg-elevated) 94%, var(--lia-soft)) 0%,
          color-mix(in srgb, var(--bg-elevated) 72%, transparent) 55%
        );
      }
      .tile--lia::before {
        content: "";
        position: absolute;
        top: -40%;
        right: -25%;
        width: 58%;
        height: 95%;
        background: radial-gradient(ellipse at center, color-mix(in srgb, var(--lia) 16%, transparent), transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      @media (prefers-reduced-motion: no-preference) {
        .tile {
          animation: enter 0.75s var(--ease-out) backwards;
        }
        .tile--a {
          animation-delay: 0.06s;
        }
        .tile--b {
          animation-delay: 0.12s;
        }
        .tile--wide {
          animation-delay: 0.2s;
        }
      }
      @keyframes enter {
        from {
          opacity: 0;
          transform: translateY(18px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .tile--stack.tile--liu:hover {
        border-color: color-mix(in srgb, var(--liu) 45%, var(--stroke));
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 24px 56px -28px var(--liu-glow),
          -6px 0 0 0 color-mix(in srgb, var(--liu) 88%, transparent) inset;
        transform: translateY(-3px);
      }
      .tile--stack.tile--lia:hover {
        border-color: color-mix(in srgb, var(--lia) 45%, var(--stroke));
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.5) inset,
          0 24px 56px -28px var(--lia-glow),
          -6px 0 0 0 color-mix(in srgb, var(--lia) 88%, transparent) inset;
        transform: translateY(-3px);
      }
      .tile--stack.tile--hub:hover {
        transform: translateY(-2px);
      }
      .menu-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
      .tile--liu .menu-link:focus-visible {
        outline-color: var(--liu);
      }
      .tile--lia .menu-link:focus-visible {
        outline-color: var(--lia);
      }

      .tile__inner {
        position: relative;
        z-index: 1;
        padding: clamp(1.15rem, 3.2vw, 1.75rem);
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }

      .tile-intro {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.85rem;
        padding-bottom: 0.85rem;
        margin-bottom: 0.05rem;
        border-bottom: 1px dashed color-mix(in srgb, var(--stroke) 70%, transparent);
      }
      .tile--liu .tile-intro {
        border-bottom-color: color-mix(in srgb, var(--liu) 25%, var(--stroke));
      }
      .tile--lia .tile-intro {
        border-bottom-color: color-mix(in srgb, var(--lia) 25%, var(--stroke));
      }
      .tile-glow-dot {
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 50%;
        flex-shrink: 0;
        box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 12%, transparent);
      }
      .tile--liu .tile-glow-dot {
        color: var(--liu);
        background: radial-gradient(circle at 30% 30%, #fff 0%, var(--liu) 45%);
        box-shadow:
          0 0 0 4px color-mix(in srgb, var(--liu) 16%, transparent),
          0 0 20px var(--liu-glow);
      }
      .tile--lia .tile-glow-dot {
        color: var(--lia);
        background: radial-gradient(circle at 30% 30%, #fff 0%, var(--lia) 42%);
        box-shadow:
          0 0 0 4px color-mix(in srgb, var(--lia) 16%, transparent),
          0 0 20px var(--lia-glow);
      }
      @media (prefers-color-scheme: dark) {
        .tile--liu .tile-glow-dot {
          background: radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--liu) 50%, transparent) 0%, var(--liu) 55%);
        }
        .tile--lia .tile-glow-dot {
          background: radial-gradient(circle at 30% 30%, color-mix(in srgb, var(--lia) 50%, transparent) 0%, var(--lia) 55%);
        }
      }

      .child-label {
        font-family: var(--font-display);
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-soft);
      }
      .child-title {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: clamp(1.35rem, 3.2vw, 1.6rem);
        letter-spacing: -0.045em;
        margin: 0;
        line-height: 1.1;
      }
      .tile--liu .child-title {
        background: linear-gradient(108deg, var(--liu) 0%, color-mix(in srgb, var(--liu) 35%, var(--text)) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .tile--lia .child-title {
        background: linear-gradient(108deg, var(--lia) 0%, color-mix(in srgb, var(--lia) 32%, var(--text)) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .menu-links {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
        margin-top: 0.15rem;
      }
      .menu-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        padding: 0.82rem 1rem;
        border-radius: calc(var(--radius-lg) + 2px);
        border: 1px solid color-mix(in srgb, var(--stroke) 85%, transparent);
        background: color-mix(in srgb, var(--bg-elevated) 72%, transparent);
        text-decoration: none;
        color: var(--text);
        font-weight: 600;
        font-size: 0.905rem;
        transition:
          border-color 0.28s ease,
          background 0.28s ease,
          transform 0.4s var(--ease-spring),
          box-shadow 0.35s var(--ease-out);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      .menu-link span {
        font-family: var(--font-body);
      }
      .menu-link svg {
        width: 1.15rem;
        height: 1.15rem;
        flex-shrink: 0;
        padding: 0.38rem;
        border-radius: 0.62rem;
        background: color-mix(in srgb, var(--accent) 09%, var(--bg-elevated));
        color: var(--accent);
        box-sizing: content-box;
        transition: transform 0.35s var(--ease-out), background 0.28s ease, color 0.28s ease;
      }
      .tile--liu .menu-link svg {
        color: var(--liu);
        background: color-mix(in srgb, var(--liu) 11%, var(--bg-elevated));
      }
      .tile--lia .menu-link svg {
        color: var(--lia);
        background: color-mix(in srgb, var(--lia) 11%, var(--bg-elevated));
      }
      .menu-link:hover {
        border-color: color-mix(in srgb, var(--accent) 32%, var(--stroke));
        background: color-mix(in srgb, var(--accent) 06%, var(--bg-elevated));
        transform: translateX(5px);
        box-shadow: 0 8px 24px -12px var(--accent-glow);
      }
      .tile--liu .menu-link:hover {
        border-color: color-mix(in srgb, var(--liu) 45%, var(--stroke));
        background: color-mix(in srgb, var(--liu) 08%, var(--bg-elevated));
        box-shadow: 0 10px 28px -14px var(--liu-glow);
      }
      .tile--lia .menu-link:hover {
        border-color: color-mix(in srgb, var(--lia) 45%, var(--stroke));
        background: color-mix(in srgb, var(--lia) 08%, var(--bg-elevated));
        box-shadow: 0 10px 28px -14px var(--lia-glow);
      }
      .menu-link:hover svg {
        transform: translate(3px, -2px);
      }

      .tile--hub::after {
        opacity: 0.28;
      }

      /* 가족 공통 허브 (급식 · 하이톡) */
      .tile--hub {
        position: relative;
        border-color: color-mix(in srgb, var(--accent) 22%, var(--stroke));
        background: linear-gradient(
          128deg,
          color-mix(in srgb, var(--bg-elevated) 90%, transparent) 0%,
          color-mix(in srgb, var(--accent) 09%, var(--bg-elevated)) 42%,
          color-mix(in srgb, var(--hitalk) 06%, var(--bg-elevated)) 72%,
          color-mix(in srgb, var(--bg-elevated) 86%, transparent) 100%
        );
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--accent) 14%, transparent) inset,
          0 28px 64px -32px color-mix(in srgb, var(--accent-glow), var(--hitalk-glow) 40%);
      }
      .tile--hub::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--accent) 45%, transparent),
          color-mix(in srgb, #ec4899 25%, transparent),
          color-mix(in srgb, #0ea5e9 30%, transparent)
        );
        mask:
          linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        mask-composite: exclude;
        -webkit-mask-composite: xor;
        pointer-events: none;
        opacity: 0.55;
      }

      .hub-inner {
        position: relative;
        z-index: 1;
        gap: clamp(1rem, 3vw, 1.5rem);
      }

      .hub-head {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      @media (min-width: 640px) {
        .hub-head {
          flex-direction: row;
          flex-wrap: wrap;
          align-items: flex-start;
          justify-content: space-between;
          gap: 1rem 1.5rem;
        }
      }

      .hub-badge {
        display: inline-flex;
        align-self: flex-start;
        align-items: center;
        gap: 0.45rem;
        padding: 0.42rem 0.92rem;
        border-radius: 999px;
        font-family: var(--font-display);
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--accent) 94%, #fff);
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--accent) 26%, var(--bg-elevated)),
          color-mix(in srgb, var(--hitalk) 18%, var(--bg-elevated))
        );
        border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.28) inset,
          0 10px 28px -16px var(--accent-glow);
      }

      .hub-head-text {
        flex: 1;
        min-width: min(100%, 22rem);
      }

      .hub-title {
        margin: 0;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: clamp(1.4rem, 3.6vw, 1.82rem);
        letter-spacing: -0.045em;
        line-height: 1.15;
        background: linear-gradient(102deg, var(--text) 0%, color-mix(in srgb, var(--accent) 55%, var(--text)) 55%, color-mix(in srgb, var(--hitalk) 42%, var(--text)) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      @supports not (background-clip: text) {
        .hub-title {
          color: var(--text);
          background: none;
          -webkit-text-fill-color: inherit;
        }
      }

      .hub-actions {
        display: grid;
        gap: 0.65rem;
        grid-template-columns: 1fr;
      }
      @media (min-width: 520px) {
        .hub-actions {
          grid-template-columns: 1fr 1fr;
        }
      }

      .hub-card {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.45rem;
        padding: 1.15rem 1.2rem;
        border-radius: calc(var(--radius-lg) + 4px);
        border: 1px solid var(--stroke);
        background: linear-gradient(
          168deg,
          color-mix(in srgb, var(--bg-elevated) 88%, transparent) 0%,
          color-mix(in srgb, var(--bg-elevated) 58%, transparent) 100%
        );
        text-decoration: none;
        color: inherit;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.05);
        transition:
          border-color 0.28s ease,
          background 0.28s ease,
          transform 0.45s var(--ease-spring),
          box-shadow 0.4s var(--ease-out);
      }
      .hub-card--meal {
        border-color: color-mix(in srgb, var(--meal) 32%, var(--stroke));
        background: linear-gradient(
          172deg,
          color-mix(in srgb, var(--bg-elevated) 90%, transparent) 0%,
          color-mix(in srgb, var(--meal) 09%, var(--bg-elevated)) 100%
        );
        box-shadow: 0 4px 24px -12px var(--meal-glow);
      }
      .hub-card--hitalk {
        border-color: color-mix(in srgb, var(--hitalk) 32%, var(--stroke));
        background: linear-gradient(
          172deg,
          color-mix(in srgb, var(--bg-elevated) 88%, transparent) 0%,
          color-mix(in srgb, var(--hitalk) 09%, var(--bg-elevated)) 100%
        );
        box-shadow: 0 4px 24px -12px var(--hitalk-glow);
      }
      .hub-card:hover {
        transform: translateY(-5px);
      }
      .hub-card--meal:hover {
        border-color: color-mix(in srgb, var(--meal) 52%, var(--stroke));
        background: linear-gradient(
          172deg,
          color-mix(in srgb, var(--meal) 12%, var(--bg-elevated)),
          color-mix(in srgb, var(--bg-elevated) 75%, transparent)
        );
        box-shadow: 0 18px 44px -20px var(--meal-glow);
      }
      .hub-card--hitalk:hover {
        border-color: color-mix(in srgb, var(--hitalk) 48%, var(--stroke));
        background: linear-gradient(
          172deg,
          color-mix(in srgb, var(--hitalk) 11%, var(--bg-elevated)),
          color-mix(in srgb, var(--bg-elevated) 76%, transparent)
        );
        box-shadow: 0 18px 44px -20px var(--hitalk-glow);
      }
      .hub-card:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
      .hub-card--meal:focus-visible {
        outline-color: var(--meal);
      }
      .hub-card--hitalk:focus-visible {
        outline-color: var(--hitalk);
      }

      .hub-card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        gap: 0.5rem;
      }
      .hub-card-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.85rem;
        background: color-mix(in srgb, var(--accent) 12%, var(--bg-elevated));
        color: var(--accent);
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset;
      }
      .hub-card--meal .hub-card-icon {
        background: linear-gradient(145deg, color-mix(in srgb, var(--meal) 22%, var(--bg-elevated)), color-mix(in srgb, var(--meal) 08%, var(--bg-elevated)));
        color: var(--meal);
      }
      .hub-card--hitalk .hub-card-icon {
        background: linear-gradient(145deg, color-mix(in srgb, var(--hitalk) 24%, var(--bg-elevated)), color-mix(in srgb, var(--accent) 10%, var(--bg-elevated)));
        color: var(--hitalk);
      }
      .hub-card-icon svg {
        width: 1.35rem;
        height: 1.35rem;
      }
      .hub-card-go {
        width: 2.15rem;
        height: 2.15rem;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--stroke);
        background: color-mix(in srgb, var(--bg-elevated) 70%, transparent);
        color: var(--accent);
        flex-shrink: 0;
        transition: transform 0.35s var(--ease-out);
      }
      .hub-card--meal .hub-card-go {
        color: var(--meal);
        border-color: color-mix(in srgb, var(--meal) 35%, var(--stroke));
      }
      .hub-card--hitalk .hub-card-go {
        color: var(--hitalk);
        border-color: color-mix(in srgb, var(--hitalk) 35%, var(--stroke));
      }
      .hub-card:hover .hub-card-go {
        transform: translate(2px, -2px);
      }

      .hub-card-kicker {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-soft);
      }
      .hub-card-title {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: clamp(1.22rem, 2.8vw, 1.35rem);
        letter-spacing: -0.035em;
      }
      .hub-card--meal .hub-card-title {
        color: color-mix(in srgb, var(--meal) 12%, var(--text));
      }
      .hub-card--hitalk .hub-card-title {
        color: color-mix(in srgb, var(--hitalk) 10%, var(--text));
      }
      @media (prefers-reduced-motion: reduce) {
        .hub-card:hover,
        .hub-card:hover .hub-card-go {
          transform: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .menu-link:hover,
        .menu-link:hover svg {
          transform: none;
        }
        .tile {
          animation: none !important;
        }
        .tile--stack.tile--liu:hover,
        .tile--stack.tile--lia:hover,
        .tile--stack.tile--hub:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>

    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div class="brand-text">

        </div>
        <span class="tag-live" id="clock" title="현재 시각">—:—</span>
      </header>

      <main class="bento" aria-label="바로가기 영역">
        <h1 class="sr-only">Hi강리가족</h1>
        <section class="tile tile--stack tile--a tile--liu" aria-labelledby="card-first-title">
          <div class="tile__inner">
            <div class="tile-intro">
              <h2 id="card-first-title" class="child-title">LIU</h2>
              <span class="tile-glow-dot" aria-hidden="true"></span>
            </div>
            <ul class="menu-links">
              <li>
                <a
                  class="menu-link"
                  href="https://www.hiclass.net/main/clazzes/953f335b-ec9c-4047-a018-f441d925871a"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span>최근 게시글</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M7 17L17 7M17 7H8M17 7V16" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </a>
              </li>
              <li>
                <a
                  class="menu-link"
                  href="https://www.hiclass.net/main/clazzes/953f335b-ec9c-4047-a018-f441d925871a/note/fd37ce44-6466-4fa0-90a3-e2d6e656297d"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span>알림장</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M7 17L17 7M17 7H8M17 7V16" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </a>
              </li>
            </ul>
          </div>
        </section>

        <section class="tile tile--stack tile--b tile--lia" aria-labelledby="card-second-title">
          <div class="tile__inner">
            <div class="tile-intro">
              <h2 id="card-second-title" class="child-title">LIA</h2>
              <span class="tile-glow-dot" aria-hidden="true"></span>
            </div>
            <ul class="menu-links">
              <li>
                <a
                  class="menu-link"
                  href="https://www.hiclass.net/main/clazzes/bd12e648-79f5-41c8-9dce-6aa5d51c3322"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span>최근 게시글</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M7 17L17 7M17 7H8M17 7V16" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </a>
              </li>
              <li>
                <a
                  class="menu-link"
                  href="https://www.hiclass.net/main/clazzes/bd12e648-79f5-41c8-9dce-6aa5d51c3322/note/497ca61b-e816-4bc7-a85e-659659430d7a"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span>알림장</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M7 17L17 7M17 7H8M17 7V16" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                </a>
              </li>
            </ul>
          </div>
        </section>

        <section class="tile tile--wide tile--stack tile--hub" aria-labelledby="hub-title">
          <div class="tile__inner hub-inner">
            <header class="hub-head">
              <span class="hub-badge">가족 공통</span>
              <div class="hub-head-text">
                <h2 id="hub-title" class="hub-title">LIU와 LIA, 함께 보는 정보</h2>
              </div>
            </header>

            <div class="hub-actions">
              <a
                class="hub-card hub-card--meal"
                href="https://www.hiclass.net/main/schools/06f74964-d43a-11e9-86da-98be94437cd2/meal"
                target="_blank"
                rel="noopener noreferrer"
              >
                <div class="hub-card-top">
                  <span class="hub-card-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                      <path d="M4 11h16v9H4v-9zM7 11V9a5 5 0 0110 0v2M9 17h6" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  </span>
                  <span class="hub-card-go" aria-hidden="true">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M7 17L17 7M17 7H8M17 7V16" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
                <span class="hub-card-kicker">학교 급식</span>
                <span class="hub-card-title">급식</span>
              </a>

              <a
                class="hub-card hub-card--hitalk"
                href="https://www.hiclass.net/hitalk"
                target="_blank"
                rel="noopener noreferrer"
              >
                <div class="hub-card-top">
                  <span class="hub-card-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                      <path
                        d="M21 15a4 4 0 01-4 4H9l-4 3v-3H7a4 4 0 01-4-4V8a4 4 0 014-4h10a4 4 0 014 4v7z"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path d="M8 10h8M8 14h5" stroke-linecap="round" />
                    </svg>
                  </span>
                  <span class="hub-card-go" aria-hidden="true">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M7 17L17 7M17 7H8M17 7V16" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
                <span class="hub-card-kicker">공통 채널</span>
                <span class="hub-card-title">하이톡</span>
              </a>
            </div>
          </div>
        </section>
      </main>

    </div>

    <script>
      function tick() {
        var el = document.getElementById("clock");
        if (!el) return;
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        el.textContent =
          (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m;
      }
      tick();
      setInterval(tick, 30_000);
    </script>
  </body>
